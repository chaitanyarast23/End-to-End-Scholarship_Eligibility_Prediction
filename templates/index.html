<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scholarship Eligibility Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0f1f3d;
      --blue:    #1a3a6b;
      --gold:    #e8a020;
      --gold-lt: #f5c55a;
      --white:   #ffffff;
      --off:     #f4f6fb;
      --muted:   #6b7a99;
      --border:  #dde3f0;
      --green:   #12a05c;
      --red:     #d93025;
      --radius:  12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--off);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--navy);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .logo {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--white);
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--gold); }
    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--gold);
      color: var(--navy);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
      padding: 3rem 2rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 40px;
      background: var(--off);
      clip-path: ellipse(55% 100% at 50% 100%);
    }
    .hero-eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .hero h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }
    .hero p {
      color: #a8b8d8;
      font-size: 1rem;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      max-width: 680px;
      width: 100%;
      margin: -1rem auto 3rem;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(15,31,61,0.10);
      overflow: hidden;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Sora', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 1.25rem 1.75rem 0.5rem;
      border-top: 1px solid var(--border);
    }
    .section-label:first-of-type { border-top: none; padding-top: 1.75rem; }

    /* ── FIELD GRID ── */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 0.5rem 1.75rem 1.25rem;
    }
    .field-grid.single { grid-template-columns: 1fr; }
    .field-grid.triple { grid-template-columns: 1fr 1fr 1fr; }

    /* ── FIELD ── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--navy);
    }
    input, select {
      height: 42px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: var(--navy);
      background: var(--white);
      transition: border-color 0.15s;
      outline: none;
      width: 100%;
    }
    input:focus, select:focus { border-color: var(--blue); }
    input::placeholder { color: #b0bcd4; }
    .hint { font-size: 0.7rem; color: var(--muted); }

    /* ── SUBMIT ── */
    .submit-wrap {
      padding: 0.5rem 1.75rem 1.75rem;
    }
    button[type="submit"] {
      width: 100%;
      height: 52px;
      background: var(--gold);
      color: var(--navy);
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.15s, transform 0.1s;
    }
    button[type="submit"]:hover  { background: var(--gold-lt); }
    button[type="submit"]:active { transform: scale(0.99); }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── RESULT ── */
    #result { margin-top: 1.25rem; }

    .result-card {
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .result-card.eligible   { background: #e8f8f1; border: 1.5px solid #6ed4a8; }
    .result-card.ineligible { background: #fdecea; border: 1.5px solid #f5a8a4; }
    .result-card.error-card { background: #fff8e6; border: 1.5px solid #f5c55a; }

    .result-icon {
      font-size: 2.5rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .result-text h2 {
      font-family: 'Sora', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .result-card.eligible   .result-text h2 { color: var(--green); }
    .result-card.ineligible .result-text h2 { color: var(--red); }
    .result-card.error-card .result-text h2 { color: #b07000; }
    .result-text p { font-size: 0.85rem; color: var(--muted); }

    .confidence-bar {
      margin-top: 0.75rem;
      background: #dde3f0;
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      width: 200px;
      max-width: 100%;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s ease;
    }
    .eligible   .confidence-fill { background: var(--green); }
    .ineligible .confidence-fill { background: var(--red); }

    /* ── LOADING ── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(15,31,61,0.2);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .field-grid, .field-grid.triple { grid-template-columns: 1fr 1fr; }
      .hero { padding: 2rem 1.25rem 3.5rem; }
    }
    @media (max-width: 380px) {
      .field-grid, .field-grid.triple { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Scholar<span>Check</span></div>
  <div class="badge">AI Powered</div>
</header>

<div class="hero">
  <div class="hero-eyebrow">Instant eligibility check</div>
  <h1>Find out if you qualify<br>for a scholarship</h1>
  <p>Fill in your academic profile below and get an instant AI-powered decision.</p>
</div>

<main>
  <div class="card">
    <form id="scholarshipForm">

      <!-- Personal Info -->
      <div class="section-label">Personal Information</div>
      <div class="field-grid">
        <div class="field">
          <label for="gender">Gender</label>
          <select id="gender" name="gender" required>
            <option value="" disabled selected>Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="field">
          <label for="nationality">Nationality</label>
          <input type="text" id="nationality" name="nationality" placeholder="e.g. Indian" required/>
        </div>
        <div class="field">
          <label for="age">Age</label>
          <input type="number" id="age" name="age" placeholder="e.g. 20" min="10" max="60" required/>
        </div>
      </div>

      <!-- Academic Grades -->
      <div class="section-label">Academic Grades <span style="font-weight:400;text-transform:none;letter-spacing:0">(out of 100)</span></div>
      <div class="field-grid triple">
        <div class="field">
          <label for="english_grade">English</label>
          <input type="number" id="english_grade" name="english_grade" placeholder="85" min="0" max="100" step="0.1" required/>
        </div>
        <div class="field">
          <label for="math_grade">Mathematics</label>
          <input type="number" id="math_grade" name="math_grade" placeholder="90" min="0" max="100" step="0.1" required/>
        </div>
        <div class="field">
          <label for="sciences_grade">Sciences</label>
          <input type="number" id="sciences_grade" name="sciences_grade" placeholder="88" min="0" max="100" step="0.1" required/>
        </div>
        <div class="field">
          <label for="language_grade">Language</label>
          <input type="number" id="language_grade" name="language_grade" placeholder="78" min="0" max="100" step="0.1" required/>
        </div>
      </div>

      <!-- Ratings -->
      <div class="section-label">Application Ratings <span style="font-weight:400;text-transform:none;letter-spacing:0">(out of 5)</span></div>
      <div class="field-grid triple">
        <div class="field">
          <label for="portfolio_rating">Portfolio</label>
          <input type="number" id="portfolio_rating" name="portfolio_rating" placeholder="4.2" min="0" max="5" step="0.1" required/>
        </div>
        <div class="field">
          <label for="coverletter_rating">Cover Letter</label>
          <input type="number" id="coverletter_rating" name="coverletter_rating" placeholder="3.8" min="0" max="5" step="0.1" required/>
        </div>
        <div class="field">
          <label for="refletter_rating">Ref. Letter</label>
          <input type="number" id="refletter_rating" name="refletter_rating" placeholder="4.0" min="0" max="5" step="0.1" required/>
        </div>
      </div>

      <!-- Submit -->
      <div class="submit-wrap">
        <button type="submit" id="submitBtn">Check My Eligibility</button>
      </div>

    </form>
  </div>

  <!-- Result -->
  <div id="result"></div>
</main>

<script>
  const form      = document.getElementById('scholarshipForm');
  const resultDiv = document.getElementById('result');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    resultDiv.innerHTML = '';
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Checking…';

    const payload = {
      gender             : document.getElementById('gender').value,
      nationality        : document.getElementById('nationality').value,
      age                : parseInt(document.getElementById('age').value),
      english_grade      : parseFloat(document.getElementById('english_grade').value),
      math_grade         : parseFloat(document.getElementById('math_grade').value),
      sciences_grade     : parseFloat(document.getElementById('sciences_grade').value),
      language_grade     : parseFloat(document.getElementById('language_grade').value),
      portfolio_rating   : parseFloat(document.getElementById('portfolio_rating').value),
      coverletter_rating : parseFloat(document.getElementById('coverletter_rating').value),
      refletter_rating   : parseFloat(document.getElementById('refletter_rating').value),
    };

    try {
      const res  = await fetch('/predict', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.status === 'success') {
        const eligible   = data.prediction === 'Eligible';
        const confidence = parseFloat(data.confidence);
        const pct        = isNaN(confidence) ? data.confidence : confidence;

        resultDiv.innerHTML = `
          <div class="result-card ${eligible ? 'eligible' : 'ineligible'}">
            <div class="result-icon">${eligible ? '🎓' : '📋'}</div>
            <div class="result-text">
              <h2>${eligible ? 'Congratulations! You are Eligible' : 'Not Eligible at This Time'}</h2>
              <p>${eligible
                ? 'Your profile meets the scholarship criteria.'
                : 'Your profile does not meet the criteria. Keep working on your academics!'
              }</p>
              <p style="margin-top:6px;font-weight:600;font-size:0.8rem;">
                Confidence: ${data.confidence}
              </p>
              <div class="confidence-bar">
                <div class="confidence-fill" style="width:${pct}%"></div>
              </div>
            </div>
          </div>`;
      } else {
        resultDiv.innerHTML = `
          <div class="result-card error-card">
            <div class="result-icon">⚠️</div>
            <div class="result-text">
              <h2>Something went wrong</h2>
              <p>${data.message || 'Please try again.'}</p>
            </div>
          </div>`;
      }
    } catch (err) {
      resultDiv.innerHTML = `
        <div class="result-card error-card">
          <div class="result-icon">⚠️</div>
          <div class="result-text">
            <h2>Could not reach server</h2>
            <p>Make sure the Flask app is running and try again.</p>
          </div>
        </div>`;
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Check My Eligibility';
      resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });
</script>

</body>
</html>
